<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>GeoTech - Uploader</title>
    <style>
        body { font-family: monospace; background: #0a0f1d; color: #00ff66; text-align: center; padding-top: 100px; }
        .upload-card { width: 420px; margin: 0 auto; background: #111a2e; padding: 30px; border: 2px dashed #ff9900; border-radius: 8px; }
        input[type="file"] { margin: 20px 0; color: #fff; background: #1c2a4a; padding: 10px; border: 1px solid #1877f2; width: 88%; }
        button { background: #ff9900; color: black; border: none; padding: 12px; width: 94%; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .success-alert { background: rgba(0, 255, 102, 0.15); border: 1px solid #00ff66; padding: 10px; color: #fff; margin-bottom: 20px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="upload-card">
        <h3 style="color:#ff9900;">[ INIEZIONE FILE INTELLIGENCE ]</h3>
        
        {% if successo %}
            <div class="success-alert">
                SISTEMA: File caricato e registrato nel nucleo.<br>
                <small style="color:#00ff66;">ID: {{ nome_file }}</small>
            </div>
        {% endif %}

        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Avvia Upload Sicuro</button>
        </form>
        <p style="margin-top:25px;"><a href="/" style="color:#00ffff; text-decoration:none;">◀ Torna alla Mappa Principale</a></p>
    </div>
</body>
</html>
